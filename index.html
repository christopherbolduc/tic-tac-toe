<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <style>
      :root {
        color-scheme: dark;
        --color-bg: #110e0f;
        --color-surface: rgba(32, 24, 22, 0.72);
        --color-surface-border: rgba(255, 189, 132, 0.22);
        --color-text: #f7efe9;
        --color-text-muted: #d6c5b9;
        --color-accent: #cd6a24;
        --color-accent-strong: #ef7f2e;
        --blur-panel: 16px;
        --radius-panel: 22px;
        --elevation-panel: 0 24px 60px rgba(0, 0, 0, 0.45);
        --glow-soft: 0 0 24px rgba(205, 106, 36, 0.35);
        --line-height-base: 1.45;
      }

      body {
        background:
          radial-gradient(circle at top right, rgba(205, 106, 36, 0.2), transparent 45%),
          radial-gradient(circle at left 20%, rgba(118, 52, 20, 0.28), transparent 40%),
          var(--color-bg);
        color: var(--color-text);
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        line-height: var(--line-height-base);
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        overflow-x: hidden;
        overflow-y: auto;
        padding: clamp(14px, 3.2vw, 24px) clamp(14px, 3vw, 18px);
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      .bg-orb {
        animation: orbDrift var(--orb-duration, 22s) ease-in-out infinite alternate;
        border-radius: 50%;
        filter: blur(2px);
        pointer-events: none;
        position: fixed;
        will-change: transform, opacity;
        z-index: 0;
      }

      .orb-a {
        --orb-duration: 18s;
        background: radial-gradient(circle, rgba(239, 127, 46, 0.32), rgba(239, 127, 46, 0));
        height: 340px;
        right: -70px;
        top: -80px;
        width: 340px;
      }

      .orb-b {
        animation-name: orbDriftAlt;
        --orb-duration: 22s;
        background: radial-gradient(circle, rgba(85, 125, 190, 0.2), rgba(85, 125, 190, 0));
        bottom: -90px;
        height: 360px;
        left: -90px;
        width: 360px;
      }

      .orb-c {
        --orb-duration: 16s;
        background: radial-gradient(circle, rgba(233, 184, 102, 0.18), rgba(233, 184, 102, 0));
        height: 220px;
        left: 18%;
        top: 14%;
        width: 220px;
      }

      .orb-d {
        animation-name: orbDriftAlt;
        --orb-duration: 20s;
        background: radial-gradient(circle, rgba(121, 170, 229, 0.16), rgba(121, 170, 229, 0));
        bottom: 14%;
        height: 180px;
        right: 16%;
        width: 180px;
      }

      #confetti-layer {
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        position: fixed;
        z-index: 3;
      }

      .confetti-piece {
        animation: confettiDrop var(--fall-duration, 1400ms) cubic-bezier(0.18, 0.75, 0.28, 1) forwards;
        background: var(--piece-color, var(--color-accent-strong));
        border-radius: 2px;
        height: var(--piece-height, 12px);
        left: var(--piece-left, 50%);
        opacity: 0;
        position: absolute;
        top: -12%;
        transform: translateY(0) rotate(var(--piece-rotation, 0deg));
        width: var(--piece-width, 8px);
        will-change: transform, opacity;
      }

      .app-shell {
        align-items: start;
        display: grid;
        gap: 14px;
        grid-template-columns: minmax(0, 560px) minmax(0, 340px);
        justify-content: center;
        min-height: calc(100vh - 28px);
        min-height: calc(100dvh - 28px);
        position: relative;
        width: 100%;
        z-index: 1;
      }

      .settings-panel,
      .game-panel,
      .meta-panel {
        background: linear-gradient(160deg, rgba(35, 27, 24, 0.84), rgba(18, 14, 16, 0.86));
        border: 1px solid var(--color-surface-border);
        border-radius: 28px;
        box-shadow: var(--elevation-panel), var(--glow-soft);
        padding: clamp(18px, 2.8vw, 26px);
      }

      .side-column {
        display: grid;
        gap: 14px;
        max-width: 340px;
        order: 2;
        width: 100%;
      }

      .settings-panel {
        display: grid;
        gap: 12px;
      }

      .settings-panel h2,
      .meta-panel h2 {
        font-size: 1rem;
        letter-spacing: 0.05em;
        margin: 0;
        text-transform: uppercase;
      }

      .settings-body {
        display: grid;
        gap: 12px;
      }

      .game-panel {
        display: grid;
        gap: 12px;
        max-width: 560px;
        order: 1;
        width: 100%;
      }

      .meta-panel {
        display: grid;
        gap: 12px;
      }

      .panel-header {
        align-items: start;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .panel-header-text {
        min-width: 0;
      }

      h1,
      p {
        margin: 0 0 16px;
      }

      h1 {
        font-size: clamp(1.8rem, 2.8vw, 2.2rem);
        letter-spacing: 0.02em;
        margin-bottom: 8px;
      }

      #status {
        font-size: clamp(0.98rem, 1.35vw, 1.05rem);
      }

      #board,
      #status,
      #play-again {
        backdrop-filter: blur(var(--blur-panel));
      }

      #board {
        background: var(--color-surface);
        border: 1px solid var(--color-surface-border);
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin: 0 auto 14px;
        max-width: 360px;
        padding: 12px;
        border-radius: 18px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), var(--glow-soft);
        width: min(100%, 360px);
      }

      #status {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--color-surface-border);
        border-radius: 12px;
        color: var(--color-text);
        margin-bottom: 12px;
        max-width: 100%;
        padding: 8px 12px;
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      }

      #status.is-thinking {
        animation: statusPulse 1s ease-in-out infinite;
        border-color: rgba(239, 127, 46, 0.65);
        box-shadow: 0 0 18px rgba(239, 127, 46, 0.28);
      }

      #status.result-win {
        animation: outcomePulseWin 900ms ease-in-out 2;
        border-color: rgba(255, 179, 84, 0.85);
        box-shadow: 0 0 24px rgba(255, 166, 73, 0.42);
      }

      #status.result-loss {
        animation: outcomePulseLoss 800ms cubic-bezier(0.31, 0.08, 0.17, 1) 2;
        border-color: rgba(240, 106, 72, 0.76);
        box-shadow: 0 0 18px rgba(240, 106, 72, 0.35);
      }

      #status.result-draw {
        animation: outcomePulseDraw 1000ms ease-in-out 2;
        border-color: rgba(149, 173, 198, 0.72);
        box-shadow: 0 0 16px rgba(133, 162, 193, 0.28);
      }

      #status.is-turn-shift {
        animation: turnShiftPulse 220ms ease-out;
      }

      .cell {
        align-items: center;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--color-surface-border);
        border-radius: 12px;
        color: var(--color-accent-strong);
        display: inline-flex;
        font-family: "Avenir Next Condensed", "Roboto Condensed", "Segoe UI", Arial, sans-serif;
        font-size: clamp(2.4rem, 8vw, 3.8rem);
        font-weight: 700;
        height: auto;
        justify-content: center;
        letter-spacing: 0.04em;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background-color 180ms ease;
        width: 100%;
        aspect-ratio: 1 / 1;
      }

      .cell:hover {
        background: rgba(255, 255, 255, 0.11);
        border-color: rgba(239, 127, 46, 0.6);
        box-shadow: inset 0 0 0 1px rgba(239, 127, 46, 0.3), 0 6px 16px rgba(0, 0, 0, 0.35);
        transform: translateY(-2px);
      }

      .cell:focus-visible {
        border-color: rgba(239, 127, 46, 0.8);
        box-shadow: 0 0 0 2px rgba(239, 127, 46, 0.42);
        outline: 2px solid rgba(247, 239, 233, 0.92);
        outline-offset: 2px;
      }

      .cell.is-filled {
        animation: cellPopIn 220ms cubic-bezier(0.18, 0.8, 0.2, 1);
      }

      #board.is-thinking .cell {
        opacity: 0.84;
        transform: scale(0.985);
      }

      #board.result-win .cell {
        border-color: rgba(255, 180, 90, 0.64);
        box-shadow: 0 0 14px rgba(255, 153, 62, 0.28);
      }

      #board.result-loss .cell {
        border-color: rgba(220, 107, 90, 0.56);
        box-shadow: 0 0 10px rgba(220, 107, 90, 0.22);
      }

      #board.result-draw .cell {
        border-color: rgba(140, 160, 182, 0.56);
        box-shadow: 0 0 8px rgba(140, 160, 182, 0.18);
      }

      #board.is-turn-shift .cell {
        transform: translateY(-1px);
      }

      .panel-actions {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }

      .game-panel .panel-actions {
        justify-content: center;
      }

      .settings-panel .panel-actions {
        gap: 8px;
      }

      .settings-panel label {
        color: var(--color-text-muted);
        font-size: 0.86rem;
      }

      .settings-note {
        color: var(--color-text-muted);
        font-size: 0.8rem;
        margin: -4px 0 2px;
      }

      .settings-panel input[type="text"],
      .settings-panel input[type="hidden"] {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--color-surface-border);
        border-radius: 8px;
        color: var(--color-text);
        font: inherit;
        min-height: 34px;
        padding: 6px 8px;
      }

      .settings-panel input[type="hidden"] {
        display: none;
      }

      .setting-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: flex-end;
      }

      .setting-button {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--color-surface-border);
        border-radius: 999px;
        color: var(--color-text-muted);
        cursor: pointer;
        font: inherit;
        font-size: 0.84rem;
        min-height: 32px;
        padding: 5px 11px;
        transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease;
      }

      .setting-button.is-active {
        background: rgba(205, 106, 36, 0.18);
        border-color: rgba(205, 106, 36, 0.55);
        color: var(--color-text);
      }

      .setting-button:focus-visible {
        outline: 2px solid rgba(205, 106, 36, 0.6);
        outline-offset: 1px;
      }

      .analytics-panel {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--color-surface-border);
        border-radius: 14px;
        display: grid;
        gap: 6px 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin: 0;
        padding: 10px 12px;
      }

      .analytics-item {
        align-items: baseline;
        display: flex;
        gap: 6px;
        justify-content: space-between;
      }

      .analytics-label {
        color: var(--color-text-muted);
        font-size: 0.8rem;
      }

      .analytics-value {
        font-size: 0.92rem;
        font-variant-numeric: tabular-nums;
        font-weight: 600;
      }

      #play-again {
        background: linear-gradient(135deg, var(--color-accent), var(--color-accent-strong));
        border: 0;
        border-radius: 999px;
        color: #140d09;
        cursor: pointer;
        font-size: 1.05rem;
        font-weight: 700;
        min-height: 44px;
        padding: 10px 16px;
        touch-action: manipulation;
        transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
        width: min(100%, 340px);
      }

      .cell {
        touch-action: manipulation;
      }

      #play-again:hover,
      #play-again:focus-visible {
        box-shadow: 0 10px 24px rgba(205, 106, 36, 0.36);
        filter: saturate(1.05);
        transform: translateY(-1px);
      }

      #play-again:focus-visible {
        outline: none;
      }

      #play-again.is-thinking {
        box-shadow: 0 0 0 1px rgba(239, 127, 46, 0.42), 0 0 18px rgba(239, 127, 46, 0.34);
      }

      #play-again.is-ready {
        animation: playAgainPulse 1.25s ease-in-out infinite;
        box-shadow: 0 0 0 1px rgba(255, 189, 105, 0.46), 0 0 20px rgba(255, 165, 79, 0.42);
      }

      #new-match,
      #reset-stats {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--color-surface-border);
        border-radius: 10px;
        color: var(--color-text);
        cursor: pointer;
        font: inherit;
        min-height: 38px;
        padding: 8px 12px;
        transition: border-color 180ms ease, background-color 180ms ease;
      }

      #new-match:hover,
      #new-match:focus-visible,
      #reset-stats:hover,
      #reset-stats:focus-visible {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(239, 127, 46, 0.46);
      }

      .meta-panel .panel-actions {
        gap: 8px;
      }

      .meta-panel .panel-actions > * {
        flex: 1;
      }

      @keyframes statusPulse {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-1px);
        }
      }

      @keyframes outcomePulseWin {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.03);
        }
      }

      @keyframes outcomePulseLoss {
        0%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(1px);
        }
        70% {
          transform: translateY(-1px);
        }
      }

      @keyframes outcomePulseDraw {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.015);
        }
      }

      @keyframes cellPopIn {
        0% {
          opacity: 0.75;
          transform: scale(0.86);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes turnShiftPulse {
        0% {
          opacity: 0.8;
          transform: translateY(1px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes playAgainPulse {
        0%,
        100% {
          box-shadow: 0 0 0 1px rgba(255, 189, 105, 0.46), 0 0 18px rgba(255, 165, 79, 0.34);
          transform: translateY(0) scale(1);
        }
        50% {
          box-shadow: 0 0 0 1px rgba(255, 197, 122, 0.68), 0 0 26px rgba(255, 177, 93, 0.56);
          transform: translateY(-1px) scale(1.015);
        }
      }

      @keyframes confettiDrop {
        0% {
          opacity: 0;
          transform: translateY(-8vh) rotate(0deg);
        }
        12% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(110vh) rotate(540deg);
        }
      }

      @keyframes orbDrift {
        0% {
          opacity: 0.84;
          transform: translate3d(0, 0, 0) scale(1);
        }
        100% {
          opacity: 1;
          transform: translate3d(-28px, 22px, 0) scale(1.08);
        }
      }

      @keyframes orbDriftAlt {
        0% {
          opacity: 0.8;
          transform: translate3d(0, 0, 0) scale(1);
        }
        100% {
          opacity: 1;
          transform: translate3d(24px, -20px, 0) scale(1.07);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .bg-orb,
        .cell,
        #status,
        #play-again,
        .confetti-piece {
          animation: none;
          transition: none;
        }
      }

      @media (max-width: 980px) {
        .app-shell {
          grid-template-columns: minmax(0, 1fr);
          margin: 0 auto;
          max-width: 620px;
        }

        .side-column,
        .settings-panel,
        .game-panel,
        .meta-panel {
          max-width: 100%;
          order: 0;
          width: 100%;
        }
      }

      @media (max-width: 640px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .side-column,
        .settings-panel {
          width: 100%;
        }

        .game-panel {
          border-radius: 24px;
          padding: 20px;
        }

        #board {
          gap: 7px;
          width: 100%;
        }

        .cell {
          font-size: clamp(2rem, 13vw, 2.8rem);
        }

        .panel-actions {
          flex-wrap: wrap;
          gap: 8px;
          justify-content: center;
        }

        .panel-actions > * {
          width: 100%;
        }

        #play-again {
          width: min(100%, 340px);
        }

        .analytics-panel {
          grid-template-columns: 1fr;
        }

        .panel-header {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-orb orb-c"></div>
    <div class="bg-orb orb-d"></div>
    <div id="confetti-layer" aria-hidden="true"></div>
    <main class="app-shell">
      <div class="side-column">
        <aside class="settings-panel" aria-label="Game settings">
          <h2>Settings</h2>
          <div class="settings-body">
            <div class="panel-actions">
              <label for="mode">Mode</label>
              <input id="mode" name="mode" type="hidden" value="pvc" />
              <div class="setting-buttons" data-setting-for="mode" role="group" aria-label="Mode">
                <button class="setting-button is-active" type="button" data-setting-value="pvc">Player vs Computer</button>
                <button class="setting-button" type="button" data-setting-value="pvp">Player vs Player</button>
              </div>
            </div>
            <div class="panel-actions">
              <label id="player-name-label" for="player-name">Player name</label>
              <input id="player-name" name="player-name" type="text" value="Player" />
            </div>
            <div id="player-two-name-row" class="panel-actions">
              <label for="player-two-name">Player 2 name</label>
              <input id="player-two-name" name="player-two-name" type="text" value="Player 2" />
            </div>
            <div id="player-mark-row" class="panel-actions">
              <label for="player-mark">Player marker</label>
              <input id="player-mark" name="player-mark" type="hidden" value="X" />
              <div class="setting-buttons" data-setting-for="player-mark" role="group" aria-label="Player marker">
                <button class="setting-button is-active" type="button" data-setting-value="X">X</button>
                <button class="setting-button" type="button" data-setting-value="O">O</button>
              </div>
              <label aria-hidden="true">(X goes first)</label>
            </div>
            <p id="pvp-turn-order-note" class="settings-note">
              Player 1 is X and goes first.<br />Player 2 is O and goes second.
            </p>
            <div id="difficulty-row" class="panel-actions">
              <label for="difficulty">Difficulty</label>
              <input id="difficulty" name="difficulty" type="hidden" value="medium" />
              <div class="setting-buttons" data-setting-for="difficulty" role="group" aria-label="Difficulty">
                <button class="setting-button" type="button" data-setting-value="easy">Easy</button>
                <button class="setting-button is-active" type="button" data-setting-value="medium">Medium</button>
                <button class="setting-button" type="button" data-setting-value="hard">Hard</button>
              </div>
            </div>
            <div class="panel-actions">
              <label for="match-length">Match length</label>
              <input id="match-length" name="match-length" type="hidden" value="single" />
              <div class="setting-buttons" data-setting-for="match-length" role="group" aria-label="Match length">
                <button class="setting-button is-active" type="button" data-setting-value="single">Single</button>
                <button class="setting-button" type="button" data-setting-value="bo3">Best of 3</button>
              </div>
            </div>
          </div>
        </aside>

        <aside class="meta-panel" aria-label="Match controls and stats">
          <h2>Match &amp; Stats</h2>
          <section id="analytics-panel" class="analytics-panel" aria-label="Analytics">
            <div class="analytics-item">
              <span class="analytics-label">Rounds</span>
              <span id="analytics-total-rounds" class="analytics-value">0</span>
            </div>
            <div class="analytics-item">
              <span class="analytics-label">Moves</span>
              <span id="analytics-total-moves" class="analytics-value">0</span>
            </div>
            <div class="analytics-item">
              <span class="analytics-label">Draws</span>
              <span id="analytics-draws" class="analytics-value">0</span>
            </div>
          </section>
          <div class="panel-actions">
            <button id="new-match" type="button" aria-label="Start new match">New match</button>
            <button id="reset-stats" type="button" aria-label="Reset stats">Reset stats</button>
          </div>
        </aside>
      </div>
      <section class="game-panel">
        <header class="panel-header">
          <div class="panel-header-text">
            <h1>Tic-Tac-Toe</h1>
            <p id="status" role="status" aria-live="polite">Your turn!</p>
          </div>
        </header>
        <div id="board"></div>
        <div class="panel-actions">
          <button id="play-again" type="button" aria-label="Single Game">Single Game</button>
        </div>
      </section>
    </main>
    <script src="./game.js?v=20260308"></script>
    <script src="./ai.js?v=20260308"></script>
    <script src="./ui.js?v=20260308"></script>
    <script src="./main.js?v=20260308"></script>
  </body>
</html>
